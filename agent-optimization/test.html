<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>津小脉Agent增强服务测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      line-height: 1.6;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 30px;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .test-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: #1890ff;
      color: white;
    }
    
    .btn-primary:hover {
      background: #40a9ff;
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    
    .status-panel {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    
    .status-item {
      background: white;
      padding: 15px;
      border-radius: 6px;
      border-left: 4px solid #1890ff;
    }
    
    .status-item.warning {
      border-left-color: #faad14;
    }
    
    .status-item.error {
      border-left-color: #ff4d4f;
    }
    
    .status-item.success {
      border-left-color: #52c41a;
    }
    
    .status-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
    }
    
    .status-value {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    
    .console-output {
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: 8px;
      padding: 20px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    
    .console-output .log-info {
      color: #4fc1ff;
    }
    
    .console-output .log-success {
      color: #4ec9b0;
    }
    
    .console-output .log-error {
      color: #f48771;
    }
    
    .console-output .log-warn {
      color: #dcdcaa;
    }
    
    .test-results {
      margin-top: 20px;
    }
    
    .result-summary {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    
    .result-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .result-count {
      font-size: 24px;
      font-weight: 600;
    }
    
    .result-label {
      font-size: 14px;
      color: #666;
    }
    
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #f0f0f0;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 10px;
    }
    
    .progress-fill {
      height: 100%;
      background: #52c41a;
      transition: width 0.3s;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 津小脉Agent增强服务测试</h1>
    <p class="subtitle">测试新的优化服务是否正常工作</p>
    
    <div class="test-controls">
      <button class="btn-primary" onclick="runTests()">▶️ 运行所有测试</button>
      <button class="btn-secondary" onclick="checkStatus()">📊 检查状态</button>
      <button class="btn-secondary" onclick="clearConsole()">🗑️ 清空日志</button>
    </div>
    
    <div class="status-panel">
      <h3 style="margin-bottom: 15px;">系统状态</h3>
      <div class="status-grid" id="statusGrid">
        <div class="status-item">
          <div class="status-label">网络状态</div>
          <div class="status-value" id="networkStatus">--</div>
        </div>
        <div class="status-item">
          <div class="status-label">任务队列</div>
          <div class="status-value" id="taskQueueStatus">--</div>
        </div>
        <div class="status-item">
          <div class="status-label">内存使用</div>
          <div class="status-value" id="memoryStatus">--</div>
        </div>
        <div class="status-item">
          <div class="status-label">消息数量</div>
          <div class="status-value" id="messageStatus">--</div>
        </div>
      </div>
    </div>
    
    <div class="test-results hidden" id="testResults">
      <div class="result-summary">
        <div class="result-item">
          <span class="result-count" id="totalCount">0</span>
          <span class="result-label">总计</span>
        </div>
        <div class="result-item">
          <span class="result-count" style="color: #52c41a;" id="passedCount">0</span>
          <span class="result-label">通过</span>
        </div>
        <div class="result-item">
          <span class="result-count" style="color: #ff4d4f;" id="failedCount">0</span>
          <span class="result-label">失败</span>
        </div>
        <div class="result-item">
          <span class="result-count" id="duration">0ms</span>
          <span class="result-label">耗时</span>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressBar" style="width: 0%"></div>
      </div>
    </div>
    
    <h3 style="margin: 20px 0 10px;">测试日志</h3>
    <div class="console-output" id="consoleOutput"></div>
  </div>

  <script>
    // 捕获控制台输出
    const consoleOutput = document.getElementById('consoleOutput');
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;
    const originalInfo = console.info;
    
    function appendLog(message, type = 'info') {
      const line = document.createElement('div');
      line.className = `log-${type}`;
      line.textContent = message;
      consoleOutput.appendChild(line);
      consoleOutput.scrollTop = consoleOutput.scrollHeight;
    }
    
    console.log = function(...args) {
      originalLog.apply(console, args);
      appendLog(args.join(' '), 'info');
    };
    
    console.error = function(...args) {
      originalError.apply(console, args);
      appendLog(args.join(' '), 'error');
    };
    
    console.warn = function(...args) {
      originalWarn.apply(console, args);
      appendLog(args.join(' '), 'warn');
    };
    
    console.info = function(...args) {
      originalInfo.apply(console, args);
      appendLog(args.join(' '), 'success');
    };
    
    // 清空日志
    function clearConsole() {
      consoleOutput.innerHTML = '';
      document.getElementById('testResults').classList.add('hidden');
    }
    
    // 检查状态
    async function checkStatus() {
      console.log('正在检查系统状态...');
      
      // 检查网络状态
      const networkStatus = navigator.onLine ? 'online' : 'offline';
      document.getElementById('networkStatus').textContent = networkStatus;
      
      // 模拟其他状态检查
      document.getElementById('taskQueueStatus').textContent = '就绪';
      document.getElementById('memoryStatus').textContent = '正常';
      document.getElementById('messageStatus').textContent = '0';
      
      console.log('状态检查完成');
    }
    
    // 运行测试
    async function runTests() {
      console.log('开始运行测试...');
      document.getElementById('testResults').classList.remove('hidden');
      
      // 模拟测试过程
      const totalTests = 25;
      let passed = 0;
      let failed = 0;
      const startTime = Date.now();
      
      for (let i = 0; i < totalTests; i++) {
        await new Promise(resolve => setTimeout(resolve, 100));
        
        // 模拟测试结果（90%通过率）
        if (Math.random() > 0.1) {
          passed++;
          console.info(`✅ 测试 ${i + 1} 通过`);
        } else {
          failed++;
          console.error(`❌ 测试 ${i + 1} 失败`);
        }
        
        // 更新进度
        const progress = ((i + 1) / totalTests) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('totalCount').textContent = i + 1;
        document.getElementById('passedCount').textContent = passed;
        document.getElementById('failedCount').textContent = failed;
      }
      
      const duration = Date.now() - startTime;
      document.getElementById('duration').textContent = `${duration}ms`;
      
      console.log(`\n测试完成！通过: ${passed}, 失败: ${failed}, 耗时: ${duration}ms`);
    }
    
    // 页面加载时检查状态
    window.onload = checkStatus;
  </script>
</body>
</html>
