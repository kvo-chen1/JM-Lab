<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />


    <title>津脉智坊 - 津门老字号共创平台</title>
    <!-- 页面描述 -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="津门老字号共创平台，传承与创新的桥梁" />
    
    <!-- 优化资源加载策略 -->
    
    <!-- 1. DNS预解析 - 提前解析关键域名 -->
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- 2. 预连接 - 建立与关键资源服务器的连接 -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- 3. 预加载关键字体资源 -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    
    <!-- 4. 移除构建时可能导致问题的预加载资源 -->
    <!-- 这些资源会在构建过程中被正确处理，不需要手动预加载 -->
    
    <!-- 6. 预加载关键图片资源 -->
    <link rel="preload" href="data:image/svg+xml,%3csvg width='192' height='192' viewBox='0 0 512 512' fill='none' xmlns='http://www.w3.org/2000/svg'%3e%3cdefs%3e%3cfilter id='roughEdge'%3e%3cfeTurbulence type='fractalNoise' baseFrequency='0.05' numOctaves='2' result='noise' /%3e%3cfeDisplacementMap in='SourceGraphic' in2='noise' scale='5' /%3e%3c/filter%3e%3c/defs%3e%3crect width='512' height='512' fill='%23FAFAF9'/%3e%3cg opacity='0.3'%3e%3cpath d='M256 100 L400 180 H112 L256 100Z' fill='%23A8A29E'/%3e%3cpath d='M60 190 C120 190, 180 160, 256 150 C332 160, 392 190, 452 190' stroke='%23A8A29E' stroke-width='12' stroke-linecap='round' fill='none'/%3e%3cpath d='M120 300 C100 300, 80 320, 80 340 C80 360, 100 380, 120 380 H160 C180 380, 200 360, 200 340' fill='none' stroke='%23A8A29E' stroke-width='8'/%3e%3cpath d='M392 320 C412 320, 432 340, 432 360 C432 380, 412 400, 392 400 H352' fill='none' stroke='%23A8A29E' stroke-width='8'/%3e%3cpath d='M180 400 H332 L352 430 H160 L180 400Z' fill='%23A8A29E'/%3e%3c/g%3e%3crect x='50' y='50' width='412' height='412' rx='40' stroke='%23B91C1C' stroke-width='24' fill='none' filter='url(%23roughEdge)'/%3e%3ctext x='50%25' y='60%25' font-family='KaiTi, STKaiti, BiauKai, serif' font-size='340' font-weight='900' fill='%23B91C1C' text-anchor='middle' dominant-baseline='central' filter='url(%23roughEdge)'%3e津%3c/text%3e%3c/svg%3e" as="image" type="image/svg+xml" />
    
    <!-- 图标配置 -->
    <link rel="icon" href="/icons/icon-192x192.svg" type="image/svg+xml" sizes="192x192" />
    <link rel="icon" href="/icons/icon-512x512.svg" type="image/svg+xml" sizes="512x512" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />
    <!-- 兼容旧浏览器 -->
    <link rel="shortcut icon" href="/icons/icon-192x192.svg" type="image/svg+xml" />
    
    <!-- PWA 配置 -->
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- iOS 相关配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="津脉智坊" />
    <!-- Vercel 分析配置 -->
    <meta name="analytics-web-vitals" content="yes" />
    <!-- 修复mobile-web-app-capable配置 -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- 内联CSS，避免初始加载白屏 -->
    <style>
      /* 初始加载样式，避免白屏 */
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #ffffff;
        transition: background-color 0.3s ease;
      }
      
      /* 深色主题预加载 */
      body.dark {
        background-color: var(--bg-primary, #121212);
      }
      
      /* 优化初始加载状态 */
      #root {
        min-height: 100vh;
      }
      
      /* 防止字体加载闪烁 */
      html {
        font-family: 'Noto Sans SC', sans-serif;
      }
    </style>
    
    <!-- 预加载主题，避免主题切换闪烁 -->
    <script>
      // 从localStorage读取主题并立即应用
      (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        const isDark = savedTheme === 'dark';
        
        // 立即应用主题类
        if (isDark) {
          document.documentElement.classList.add('dark');
        }
        
        // 设置CSS变量，确保主题颜色正确
        document.documentElement.style.setProperty('--bg-primary', isDark ? '#121212' : '#ffffff');
      })();
    </script>
    
    <!-- 根路径重定向逻辑 -->
    <script>
      (function() {
        // 只有当访问根路径 / 且没有明确的来源标识时，才检查是否应该重定向到落地页
        if (window.location.pathname === '/') {
          // 检查是否已经从落地页跳转过来（通过sessionStorage或URL参数判断）
          const hasVisitedLanding = sessionStorage.getItem('hasVisitedLanding');
          const isFromLanding = new URLSearchParams(window.location.search).has('from_landing');
          
          // 如果没有访问过落地页，且不是从落地页跳转过来的，则重定向到落地页
          if (!hasVisitedLanding && !isFromLanding) {
            window.location.href = '/landing.html';
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Vite 入口文件 - 在构建时会被替换为构建后的文件 -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
