<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="roughEdge">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" />
    </filter>
  </defs>

  <!-- Background: Paper Texture -->
  <rect width="512" height="512" fill="#FAFAF9"/>
  
  <!-- Background Graphic: Stylized Roof & Clouds (Grey) -->
  <g opacity="0.3">
    <!-- Roof Top -->
    <path d="M256 100 L400 180 H112 L256 100Z" fill="#A8A29E"/>
    <!-- Roof Eaves -->
    <path d="M60 190 C120 190, 180 160, 256 150 C332 160, 392 190, 452 190" stroke="#A8A29E" stroke-width="12" stroke-linecap="round" fill="none"/>
    <!-- Clouds -->
    <path d="M120 300 C100 300, 80 320, 80 340 C80 360, 100 380, 120 380 H160 C180 380, 200 360, 200 340" fill="none" stroke="#A8A29E" stroke-width="8"/>
    <path d="M392 320 C412 320, 432 340, 432 360 C432 380, 412 400, 392 400 H352" fill="none" stroke="#A8A29E" stroke-width="8"/>
    <!-- Bottom Structure -->
    <path d="M180 400 H332 L352 430 H160 L180 400Z" fill="#A8A29E"/>
  </g>

  <!-- Seal Border (Red, Rough) -->
  <rect x="50" y="50" width="412" height="412" rx="40" stroke="#B91C1C" stroke-width="24" fill="none" filter="url(#roughEdge)"/>
  
  <!-- Character "津" (Red, Center) -->
  <!-- Using a standard serif/kaiti font stack to simulate calligraphy -->
  <text x="50%" y="60%" font-family="KaiTi, STKaiti, BiauKai, 'Noto Serif SC', serif" font-size="340" font-weight="900" fill="#B91C1C" text-anchor="middle" dominant-baseline="central" filter="url(#roughEdge)">津</text>
  
</svg>