<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 600" width="450" height="600">
  <defs>
    <!-- 现代深红渐变 -->
    <linearGradient id="luxuryRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B2C2C"/>
      <stop offset="50%" style="stop-color:#742A2A"/>
      <stop offset="100%" style="stop-color:#542020"/>
    </linearGradient>
    
    <!-- 金色渐变 -->
    <linearGradient id="luxuryGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F7FAFC"/>
      <stop offset="50%" style="stop-color:#ECC94B"/>
      <stop offset="100%" style="stop-color:#B7791F"/>
    </linearGradient>
    
    <!-- 黑色渐变 -->
    <linearGradient id="black" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    
    <!-- 微妙纹理 -->
    <pattern id="luxuryTexture" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="0.2" fill="#F7FAFC" opacity="0.05"/>
      <circle cx="25" cy="25" r="0.1" fill="#F7FAFC" opacity="0.03"/>
      <circle cx="75" cy="75" r="0.1" fill="#F7FAFC" opacity="0.03"/>
    </pattern>
    
    <!-- 阴影效果 -->
    <filter id="luxuryShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 主背景 -->
  <rect width="450" height="600" rx="10" fill="url(#luxuryRed)"/>
  
  <!-- 纹理层 -->
  <rect width="450" height="600" rx="10" fill="url(#luxuryTexture)"/>
  
  <!-- 顶部黑色装饰条 -->
  <rect x="0" y="0" width="450" height="40" fill="url(#black)" opacity="0.3"/>
  
  <!-- 品牌名称 -->
  <g transform="translate(225, 80)" text-anchor="middle">
    <text x="0" y="0" font-family="PingFang SC, SF Pro Display, sans-serif" font-size="28" 
          font-weight="300" fill="#F7FAFC" letter-spacing="15" opacity="0.98">津脉智坊</text>
  </g>
  
  <!-- 中间装饰 -->
  <g transform="translate(225, 300)">
    <!-- 金色圆形 -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#luxuryGold)" stroke-width="0.8" opacity="0.4"/>
    
    <!-- 现代福字 -->
    <text x="0" y="15" font-family="PingFang SC, Helvetica Neue, sans-serif" font-size="60" 
          font-weight="200" fill="url(#luxuryGold)" text-anchor="middle" filter="url(#luxuryShadow)">福</text>
  </g>
  
  <!-- 底部装饰 -->
  <g transform="translate(0, 540)">
    <rect x="0" width="450" height="2" fill="url(#luxuryGold)" opacity="0.3"/>
  </g>
  
  <!-- 底部标语 -->
  <g transform="translate(225, 570)" text-anchor="middle">
    <text x="0" y="0" font-family="PingFang SC, SF Pro Display, sans-serif" font-size="12" 
          font-weight="300" fill="#F7FAFC" letter-spacing="8" opacity="0.7">津创灵感 · 点亮创意</text>
  </g>
</svg>