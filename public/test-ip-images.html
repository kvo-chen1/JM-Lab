            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .card-title {
            padding: 15px;
            font-size: 14px;
            font-weight: bold;
        }
        .card-desc {
            padding: 0 15px 15px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
