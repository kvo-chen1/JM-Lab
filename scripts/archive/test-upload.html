<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片上传测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: #007bff;
            background-color: #f8f9fa;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background-color: #f8f9fa;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        img {
            max-width: 100%;
            margin-top: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>图片上传测试</h1>
    
    <div class="upload-area">
        <input type="file" id="fileInput" accept="image/*">
        <p>选择图片文件进行上传测试</p>
    </div>
    
    <div id="result"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const resultDiv = document.getElementById('result');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            resultDiv.innerHTML = '<p>上传中...</p>';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('http://localhost:3023/api/storage/works', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3>上传成功！</h3>
                            <p><strong>文件路径:</strong> ${data.data.path}</p>
                            <p><strong>访问URL:</strong> <a href="http://localhost:3023${data.data.url}" target="_blank">${data.data.url}</a></p>
                            <p><strong>文件大小:</strong> ${data.data.size} bytes</p>
                            <p><strong>文件类型:</strong> ${data.data.mimetype}</p>
                            <img src="http://localhost:3023${data.data.url}" alt="上传的图片">
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h3>上传失败</h3>
                            <p>${data.error}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>上传错误</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
