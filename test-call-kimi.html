<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直接测试callKimiChat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }
        .result {
            background: white;
            padding: 10px;
            border: 1px solid #ddd;
            margin: 10px 0;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        .button:hover {
            background: #45a049;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>直接测试callKimiChat</h1>
        <div>
            <button class="button" onclick="testCallKimiChat()">测试callKimiChat</button>
        </div>
        <div id="result" class="result"></div>
    </div>

    <script type="module">
        // 直接实现callKimiChat函数的简化版本
        async function callKimiChat(params) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '开始测试callKimiChat...\n';
            
            try {
                // 发送请求
                const response = await fetch('/api/kimi/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: params.model,
                        messages: params.messages,
                        stream: params.onDelta ? true : false,
                        temperature: params.temperature,
                        top_p: params.top_p,
                        max_tokens: params.max_tokens,
                    })
                });
                
                resultDiv.innerHTML += `响应状态: ${response.status} ${response.statusText}\n`;
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ }));
                    throw new Error(`Kimi API请求失败: ${response.status} ${response.statusText} - ${errorData.error || ''}`);
                }
                
                if (params.onDelta) {
                    // 处理流式响应
                    resultDiv.innerHTML += '开始处理流式响应...\n';
                    const reader = response.body?.getReader();
                    if (!reader) {
                        throw new Error('无法获取响应流');
                    }
                    
                    const decoder = new TextDecoder('utf-8');
                    let fullResponse = '';
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');
                        
                        for (const line of lines) {
                            const trimmedLine = line.trim();
                            if (trimmedLine === '') continue;
                            if (!trimmedLine.startsWith('data: ')) continue;
                            
                            const data = trimmedLine.slice(6);
                            if (data === '[DONE]') continue;
                            
                            try {
                                const jsonData = JSON.parse(data);
                                const content = jsonData.choices?.[0]?.delta?.content || '';
                                if (content) {
                                    fullResponse += content;
                                    params.onDelta(content);
                                    resultDiv.innerHTML += `流式响应: ${content}\n`;
                                }
                            } catch (e) {
                                resultDiv.innerHTML += `解析错误: ${e.message}\n`;
                                continue;
                            }
                        }
                    }
                    
                    reader.releaseLock();
                    resultDiv.innerHTML += `完整响应: ${fullResponse}\n`;
                    return fullResponse;
                } else {
                    // 处理非流式响应
                    const data = await response.json();
                    resultDiv.innerHTML += `响应数据: ${JSON.stringify(data, null, 2)}\n`;
                    
                    // 处理后端返回的响应格式
                    const responseData = data.ok ? data.data : data;
                    const content = responseData?.choices?.[0]?.message?.content || '未获取到响应';
                    resultDiv.innerHTML += `AI回复: ${content}\n`;
                    return content;
                }
            } catch (error) {
                resultDiv.innerHTML += `错误: ${error.message}\n`;
                resultDiv.innerHTML += `错误栈: ${error.stack}\n`;
                throw error;
            }
        }
        
        async function testCallKimiChat() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '';
            
            try {
                const response = await callKimiChat({
                    model: 'moonshot-v1-32k',
                    messages: [{ role: 'user', content: '你好，测试callKimiChat函数' }],
                    temperature: 0.7,
                    top_p: 0.9,
                    max_tokens: 2000,
                    stream: false
                });
                
                resultDiv.innerHTML += `测试成功！\n`;
            } catch (error) {
                resultDiv.innerHTML += `测试失败: ${error.message}\n`;
            }
        }
    </script>
</body>
</html>
