<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Service Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }
        .result {
            background: white;
            padding: 10px;
            border: 1px solid #ddd;
            margin: 10px 0;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        .button:hover {
            background: #45a049;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>LLM Service Test</h1>
        <div>
            <button class="button" onclick="testKimiApi()">测试Kimi API</button>
            <button class="button" onclick="testGenerateResponse()">测试generateResponse</button>
            <button class="button" onclick="testStreamingResponse()">测试流式响应</button>
        </div>
        <div id="result" class="result"></div>
    </div>

    <script type="module">
        // 导入llmService
        import { llmService } from './src/services/llmService.ts';
        
        const resultDiv = document.getElementById('result');
        
        function log(message) {
            resultDiv.innerHTML += `${message}\n`;
            resultDiv.scrollTop = resultDiv.scrollHeight;
        }
        
        function clearLog() {
            resultDiv.innerHTML = '';
        }
        
        // 测试Kimi API直接调用
        async function testKimiApi() {
            clearLog();
            log('开始测试Kimi API...');
            
            try {
                const response = await fetch('/api/kimi/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: '你好' }],
                        model: 'moonshot-v1-32k',
                        stream: false
                    })
                });
                
                if (!response.ok) {
                    log(`API请求失败: ${response.status} ${response.statusText}`);
                    return;
                }
                
                const data = await response.json();
                log('API响应:');
                log(JSON.stringify(data, null, 2));
                log('\nAI回复:', data?.data?.choices?.[0]?.message?.content || '未获取到回复');
            } catch (error) {
                log(`错误: ${error.message}`);
            }
        }
        
        // 测试generateResponse方法
        async function testGenerateResponse() {
            clearLog();
            log('开始测试generateResponse...');
            
            try {
                const prompt = '你好，测试generateResponse方法';
                log(`发送请求: ${prompt}`);
                
                const response = await llmService.generateResponse(prompt);
                log('\nAI回复:');
                log(response);
            } catch (error) {
                log(`错误: ${error.message}`);
                log(error.stack);
            }
        }
        
        // 测试流式响应
        async function testStreamingResponse() {
            clearLog();
            log('开始测试流式响应...');
            
            try {
                const prompt = '你好，测试流式响应';
                log(`发送请求: ${prompt}`);
                log('\nAI回复 (流式):');
                
                const response = await llmService.generateResponse(prompt, {
                    onDelta: (chunk) => {
                        log(chunk, { append: true });
                    }
                });
                
                log('\n\n完整回复:');
                log(response);
            } catch (error) {
                log(`错误: ${error.message}`);
                log(error.stack);
            }
        }
    </script>
</body>
</html>
