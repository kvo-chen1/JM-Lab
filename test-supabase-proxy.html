<!DOCTYPE html>
<html>
<head>
    <title>Test Supabase Proxy</title>
</head>
<body>
    <h1>Testing Supabase Proxy</h1>
    <div id="result"></div>
    <script type="module">
        // 模拟环境变量
        const importMetaEnv = {
            VITE_USE_LOCAL_PROXY: 'true',
            VITE_LOCAL_API_URL: 'http://localhost:3023',
            VITE_SUPABASE_URL: 'https://pptqdicaaewtnaiflfcs.supabase.co',
            VITE_SUPABASE_ANON_KEY: 'test-key',
            DEV: true
        };
        
        const supabaseUrl = importMetaEnv.VITE_SUPABASE_URL || '';
        const localApiUrl = importMetaEnv.VITE_LOCAL_API_URL || 'http://localhost:3023';
        
        // 判断是否使用本地 API 代理
        const useLocalProxy = importMetaEnv.VITE_USE_LOCAL_PROXY === 'true' || 
                              !supabaseUrl || 
                              supabaseUrl.includes('placeholder') ||
                              supabaseUrl.includes('supabase.co');
        
        document.getElementById('result').innerHTML = `
            <p>useLocalProxy: ${useLocalProxy}</p>
            <p>supabaseUrl: ${supabaseUrl}</p>
            <p>localApiUrl: ${localApiUrl}</p>
        `;
        
        // 测试代理 URL 转换
        if (useLocalProxy) {
            const testSupabaseUrl = 'https://pptqdicaaewtnaiflfcs.supabase.co/rest/v1/brand_partnerships?select=*';
            const localUrl = testSupabaseUrl.replace(
                /^https:\/\/[^/]+\/rest\/v1/,
                `${localApiUrl}/api/db`
            );
            
            document.getElementById('result').innerHTML += `
                <hr>
                <p>Original URL: ${testSupabaseUrl}</p>
                <p>Converted URL: ${localUrl}</p>
            `;
            
            // 实际测试请求
            fetch(localUrl)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('result').innerHTML += `
                        <hr>
                        <p style="color: green;">✅ Request successful!</p>
                        <pre>${JSON.stringify(data, null, 2).substring(0, 500)}</pre>
                    `;
                })
                .catch(err => {
                    document.getElementById('result').innerHTML += `
                        <hr>
                        <p style="color: red;">❌ Request failed: ${err.message}</p>
                    `;
                });
        }
    </script>
</body>
</html>
