<!DOCTYPE html>
<html>
<head>
    <title>Supabase Connection Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <h1>Supabase Connection Test</h1>
    <div id="result"></div>
    <button onclick="testConnection()">Test Connection</button>
    <button onclick="testOtp()">Test OTP</button>

    <script>
        const SUPABASE_URL = 'https://pptqdicaaewtnaiflfcs.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_AYUZnzF2LNBPXi2o_3LGbA_7ceksBnv';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing connection...';
            
            try {
                const { data, error } = await supabase.from('users').select('id').limit(1);
                if (error) {
                    resultDiv.innerHTML = '<pre style="color:red">Error: ' + JSON.stringify(error, null, 2) + '</pre>';
                } else {
                    resultDiv.innerHTML = '<pre style="color:green">Success: ' + JSON.stringify(data, null, 2) + '</pre>';
                }
            } catch (e) {
                resultDiv.innerHTML = '<pre style="color:red">Exception: ' + e.message + '</pre>';
            }
        }
        
        async function testOtp() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing OTP...';
            
            try {
                const { data, error } = await supabase.auth.signInWithOtp({
                    email: 'test@example.com',
                    options: {
                        shouldCreateUser: false
                    }
                });
                if (error) {
                    resultDiv.innerHTML = '<pre style="color:red">OTP Error: ' + JSON.stringify(error, null, 2) + '</pre>';
                } else {
                    resultDiv.innerHTML = '<pre style="color:green">OTP Success: ' + JSON.stringify(data, null, 2) + '</pre>';
                }
            } catch (e) {
                resultDiv.innerHTML = '<pre style="color:red">OTP Exception: ' + e.message + '</pre>';
            }
        }
    </script>
</body>
</html>
